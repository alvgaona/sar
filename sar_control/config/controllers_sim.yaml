controller_manager:
  ros__parameters:
    update_rate: 50
    thread_priority: 0

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController

mecanum_drive_controller:
  ros__parameters:
    tf_frame_prefix_enable: false
    front_left_wheel_name: fl_wheel_joint
    front_right_wheel_name: fr_wheel_joint
    rear_left_wheel_name: rl_wheel_joint
    rear_right_wheel_name: rr_wheel_joint
    wheel_separation_x: 0.170
    wheel_separation_y: 0.270
    wheel_radius: 0.05
    wheel_separation_x_multiplier: 0.95
    wheel_separation_y_multiplier: 0.95
    wheel_radius_multiplier: 1.0
    odom_frame_id: odom
    base_frame_id: base_link
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [3.3e-5, 3.3e-5, 0.0, 0.0, 0.0, 2.8e-3]

    publish_rate: 20.0
    open_loop: false
    position_feedback: false
    velocity_rolling_window_size: 1
    enable_odom_tf: true

    cmd_vel_timeout: 0.5
    publish_limited_velocity: false
    use_stamped_vel: false

    linear:
      x:
        has_velocity_limits: true
        has_acceleration_limits: true
        has_jerk_limits: false
        max_velocity: 1.0
        min_velocity: -1.0
        max_acceleration: 3.0
        min_acceleration: -3.0
        max_jerk: 0.0
      y:
        has_velocity_limits: true
        has_acceleration_limits: true
        has_jerk_limits: false
        max_velocity: 1.0
        min_velocity: -1.0
        max_acceleration: 3.0
        min_acceleration: -3.0
        max_jerk: 0.0
    angular:
      z:
        has_velocity_limits: true
        has_acceleration_limits: true
        has_jerk_limits: false
        max_velocity: 3.14
        min_velocity: -3.14
        max_acceleration: 8.0
        min_acceleration: -8.0
        max_jerk: 0.0
