controller_manager:
  ros__parameters:
    update_rate: 50
    #thread_priority: 0

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController

# joint_state_broadcaster:
#   ros__parameters:
#     joints:
#       - fl_wheel_joint
#       - fr_wheel_joint
#       - rl_wheel_joint
#       - rr_wheel_joint

mecanum_drive_controller:
  ros__parameters:
    front_left_wheel_command_joint_name: "fl_wheel_joint"
    front_right_wheel_command_joint_name: "fr_wheel_joint"
    rear_left_wheel_command_joint_name: "rl_wheel_joint"
    rear_right_wheel_command_joint_name: "rr_wheel_joint"

    # front_left_wheel_state_joint_name: "fl_wheel_joint"
    # front_right_wheel_state_joint_name: "fr_wheel_joint"
    # rear_right_wheel_state_joint_name: "rr_wheel_joint"
    # rear_left_wheel_state_joint_name: "rl_wheel_joint"

    kinematics:
      base_frame_offset: { x: 0.0, y: 0.0, theta: 0.0 }
      wheels_radius: 0.05
      sum_of_robot_center_projection_on_X_Y_axis: 0.44

    base_frame_id: "base_link"
    odom_frame_id: "odom"
    enable_odom_tf: true
    # twist_covariance_diagonal: [0.0, 7.0, 14.0, 21.0, 28.0, 35.0]
    # pose_covariance_diagonal: [0.0, 7.0, 14.0, 21.0, 28.0, 35.0]

    # wheel_separation_x: 0.170
    # wheel_separation_y: 0.270
