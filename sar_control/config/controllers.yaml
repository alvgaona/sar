controller_manager:
  ros__parameters:
    update_rate: 50
    thread_priority: 0

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController

mecanum_drive_controller:
  ros__parameters:
    # Husarion's default mecanum drive controller parameters
    front_left_wheel_name: "fl_wheel_joint"
    front_right_wheel_name: "fr_wheel_joint"
    rear_left_wheel_name: "rl_wheel_joint"
    rear_right_wheel_name: "rr_wheel_joint"
    # TODO: check these values against the actual robot dimensions and update as needed
    wheel_separation_x: 0.180 # 240mm total length minus 30mm wheel radius on each side
    wheel_separation_y: 0.178 # 240mm total, wheel thickness is 31mm on each side
    wheel_radius: 0.03 # 60mm diameter wheels
    position_feedback: false
    # cmd_vel_timeout: 0.5
    # use_stamped_vel: true
    # theres more parameters relating to velocity limits and acceleration limits, but we'll use the defaults for those for now

    # default mecanum drive controller parameters
    reference_timeout: 5.0

    front_left_wheel_command_joint_name: "fl_wheel_joint"
    front_right_wheel_command_joint_name: "fr_wheel_joint"
    rear_right_wheel_command_joint_name: "rr_wheel_joint"
    rear_left_wheel_command_joint_name: "rl_wheel_joint"

    kinematics:
      wheels_radius: 0.03
      # sum_of_robot_center_projection_on_X_Y_axis: 0.44
      # base_frame_offset: { x: 0.0, y: 0.0, theta: 0.0 }

    # Common parameters for both controllers
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    enable_odom_tf: true
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    # pose_covariance_diagonal: [0.0, 7.0, 14.0, 21.0, 28.0, 35.0]
