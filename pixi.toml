[workspace]
authors = ["Alvaro Gaona <alvgaona@gmail.com>"]
channels = ["conda-forge"]
name = "sar"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
clean = "rm -rf build/ install/ log/"
clean-pkg = "sh -c 'rm -rf build/\"$0\" install/\"$0\"'"
build = "sh -c 'colcon build --symlink-install --event-handlers console_direct+ --cmake-args -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_CXX_FLAGS=\"-Wall\" -DPython3_EXECUTABLE=$(which python) -DPython_EXECUTABLE=$(which python)'"
build-pkg = "sh -c 'colcon build --packages-up-to \"$0\" --symlink-install --event-handlers console_direct+ --cmake-args -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_CXX_FLAGS=\"-Wall\" -DPython3_EXECUTABLE=$(which python) -DPython_EXECUTABLE=$(which python)'"

[feature.humble]
channels = ["robostack-humble"]

[feature.humble.dependencies]
ros-humble-desktop = ">=0.10.0,<0.11"
ros-humble-robot-localization = ">=3.5.4,<4"
ros-humble-nav2-common = ">=1.1.20,<2"
ros-humble-moveit-servo = ">=2.5.9,<3"
ros-humble-moveit = ">=2.5.9,<3"
ros-humble-dynamixel-sdk = ">=4.0.3,<5"
ros-humble-gz-ros2-control = ">=0.7.18,<0.8"
ros-humble-ros-gz-interfaces = ">=0.244.22,<0.245"
ros-humble-ros-gz-bridge = ">=0.244.22,<0.245"
ros-humble-ros-gz-sim = ">=0.244.22,<0.245"
ros-humble-slam-toolbox = ">=2.6.10,<3"
ros-humble-nav2-costmap-2d = ">=1.1.20,<2"
ros-humble-tf2-ros = ">=0.25.19,<0.26"
ros-humble-ros2-control = ">=2.53.1,<3"
ros-humble-ros2-controllers = ">=2.52.0,<3"
ros-humble-generate-parameter-library = ">=0.6.0,<0.7"
ros-humble-joint-state-publisher = ">=2.4.0,<3"
ros-humble-laser-filters = ">=2.0.9,<3"

[dependencies]
colcon-common-extensions = ">=0.3.0,<0.4"
pyudev = ">=0.24.3,<0.25"
ninja = ">=1.13.2,<2"
# robostack-humble's rcutils exports `-latomic`, but macOS clang has no
# system libatomic. conda-forge's libgcc ships libatomic.dylib on osx-arm64,
# satisfying the linker.
libgcc = "*"

[environments]
default = ["humble"]

[activation]
scripts = ["install/setup.sh"]
env = { LIBRARY_PATH = "$CONDA_PREFIX/lib" }
